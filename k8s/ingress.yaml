apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ancient-games-ingress
  annotations:
    # Traefik annotations
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # Cert-manager annotation for automatic TLS certificate
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Enable WebSocket support
    traefik.ingress.kubernetes.io/router.middlewares: default-headers@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - games.yourdomain.com
    secretName: ancient-games-tls
  rules:
  - host: games.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ancient-games-service
            port:
              number: 80
---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: headers
spec:
  headers:
    customResponseHeaders:
      X-Robots-Tag: "noindex, nofollow"
    sslRedirect: true
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    stsPreload: true
    forceSTSHeader: true
