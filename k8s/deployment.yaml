apiVersion: apps/v1
kind: Deployment
metadata:
  name: ancient-games
  labels:
    app: ancient-games
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ancient-games
  template:
    metadata:
      labels:
        app: ancient-games
    spec:
      containers:
        - name: ancient-games
          image: ancient-games:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: NODE_ENV
              value: 'production'
            - name: PORT
              value: '3000'
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: ancient-games-secrets
                  key: mongodb-uri
            - name: CORS_ORIGIN
              value: 'https://games.yourdomain.com'
          resources:
            requests:
              memory: '256Mi'
              cpu: '250m'
            limits:
              memory: '512Mi'
              cpu: '500m'
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
---
apiVersion: v1
kind: Secret
metadata:
  name: ancient-games-secrets
type: Opaque
stringData:
  mongodb-uri: 'mongodb://mongodb-service:27017/ancient-games'
  # For production, use MongoDB Atlas or external MongoDB:
  # mongodb-uri: "mongodb+srv://username:password@cluster.mongodb.net/ancient-games"
