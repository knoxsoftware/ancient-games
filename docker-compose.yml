version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: ancient-games-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ancient-games
    networks:
      - ancient-games-network

  ollama:
    image: ollama/ollama:latest
    container_name: ancient-games-ollama
    restart: unless-stopped
    environment:
      - OLLAMA_LOAD_TIMEOUT=10m
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ancient-games-network
    healthcheck:
      test: ['CMD', 'ollama', 'list']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  ollama-init:
    image: ollama/ollama:latest
    container_name: ancient-games-ollama-init
    restart: 'no'
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ancient-games-network
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        until ollama list 2>/dev/null; do
          echo "Waiting for ollama..."
          sleep 2
        done
        ollama pull ${OLLAMA_MODEL:-llama3.2:1b}
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ancient-games-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://mongodb:27017/ancient-games
      CORS_ORIGIN: http://localhost:3000
      AUTH_USERNAME: admin
      AUTH_PASSWORD: changeme
      OLLAMA_URL: http://ollama:11434
    depends_on:
      - mongodb
      - ollama
    networks:
      - ancient-games-network
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  mongodb_data:
    driver: local
  ollama_data:
    driver: local

networks:
  ancient-games-network:
    driver: bridge
